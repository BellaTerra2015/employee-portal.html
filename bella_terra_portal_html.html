<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Terra LLC - Employee Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; }
    </style>
</head>
<body class="bg-white">
    <div id="app"></div>

    <script>
        let isAuthenticated = false;
        let currentSection = null;

        const sections = [
            { id: 'safety', name: 'Safety', icon: '⚠️', color: 'bg-yellow-500' },
            { id: 'hydroseeding', name: 'Hydroseeding', icon: '🏡', color: 'bg-green-600' },
            { id: 'bark', name: 'Bark Blower', icon: '🚛', color: 'bg-amber-700' },
            { id: 'nursery', name: 'Nursery', icon: '🌱', color: 'bg-emerald-500' },
            { id: 'irrigation', name: 'Irrigation', icon: '💧', color: 'bg-blue-500' },
            { id: 'employee', name: 'Employee', icon: '👤', color: 'bg-gray-600' },
            { id: 'tools', name: 'Quick Tools', icon: '🧰', color: 'bg-orange-600' }
        ];

        function renderLogo() {
            return `
                <div class="flex items-center justify-center">
                    <svg width="100" height="100" viewBox="0 0 100 100" class="drop-shadow-lg">
                        <circle cx="50" cy="50" r="48" fill="#1E90FF"/>
                        <text x="50" y="72" font-size="70" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="white" stroke="white" stroke-width="8">B</text>
                        <text x="50" y="72" font-size="70" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="#228B22">B</text>
                    </svg>
                </div>
            `;
        }

        function handleLogin() {
            const password = document.getElementById('passwordInput').value;
            if (password === '1600') {
                isAuthenticated = true;
                render();
            } else {
                document.getElementById('errorMsg').textContent = 'Incorrect password';
                document.getElementById('passwordInput').value = '';
            }
        }

        function handleSectionClick(sectionId) {
            currentSection = sectionId;
            render();
        }

        function handleBackToHome() {
            currentSection = null;
            render();
        }

        function renderLoginScreen() {
            return `
                <div class="min-h-screen bg-white flex items-center justify-center p-4">
                    <div class="max-w-md w-full">
                        <div class="text-center mb-8">
                            ${renderLogo()}
                            <h1 class="text-3xl font-bold text-green-700 mt-4">Bella Terra LLC</h1>
                            <p class="text-gray-600 mt-2">Employee Portal</p>
                        </div>
                        
                        <div class="bg-green-50 p-8 rounded-lg shadow-lg">
                            <div class="mb-6">
                                <label class="block text-gray-700 font-semibold mb-2">Enter Password</label>
                                <input
                                    type="password"
                                    id="passwordInput"
                                    class="w-full px-4 py-3 border-2 border-green-300 rounded-lg focus:outline-none focus:border-green-600"
                                    placeholder="Enter portal password"
                                    onkeypress="if(event.key==='Enter') handleLogin()"
                                />
                                <p id="errorMsg" class="text-red-600 mt-2 text-sm"></p>
                            </div>
                            <button
                                onclick="handleLogin()"
                                class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-4 rounded-lg transition-colors"
                            >
                                Access Portal
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderNurserySection() {
            return `
                <div class="min-h-screen bg-white">
                    <div class="bg-green-700 text-white p-4 shadow-lg">
                        <div class="max-w-7xl mx-auto flex items-center justify-between">
                            <button
                                onclick="handleBackToHome()"
                                class="flex items-center gap-2 bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg transition-colors"
                            >
                                ← Back to Portal
                            </button>
                            <div class="flex items-center gap-3">
                                <div style="transform: scale(0.5);">
                                    ${renderLogo()}
                                </div>
                                <h1 class="text-xl font-bold">Bella Terra LLC - Nursery</h1>
                            </div>
                        </div>
                    </div>
                    <iframe
                       src="https://bellaterra2015.github.io/bella-terra-nursery/bella_terra_nursery.html"
                        class="w-full"
                        style="height: calc(100vh - 80px);"
                        title="Bella Terra Nursery App"
                    ></iframe>
                </div>
            `;
        }

    function renderHydroseedingSection() {
    return `
        <div class="min-h-screen bg-white">
            <div class="bg-green-700 text-white p-4 shadow-lg">
                <div class="max-w-7xl mx-auto flex items-center justify-between">
                    <button
                        onclick="handleBackToHome()"
                        class="flex items-center gap-2 bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg transition-colors"
                    >
                        ← Back to Portal
                    </button>
                    <div class="flex items-center gap-3">
                        <div style="transform: scale(0.5);">
                            ${renderLogo()}
                        </div>
                        <h1 class="text-xl font-bold">Bella Terra LLC - Hydroseeding</h1>
                    </div>
                </div>
            </div>
            <iframe
                src="https://bellaterra2015.github.io/employee-portal.html/hydroseed_platform_policy.html"
                class="w-full"
                style="height: calc(100vh - 80px);"
                title="Hydroseeding Platform Policy"
            ></iframe>
        </div>


                <div class="min-h-screen bg-white">
                    <div class="bg-green-700 text-white p-4 shadow-lg">
                        <div class="max-w-7xl mx-auto flex items-center justify-between">
                            <button
                                onclick="handleBackToHome()"
                                class="flex items-center gap-2 bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg transition-colors"
                            >
                                ← Back to Portal
                            </button>
                            <div class="flex items-center gap-3">
                                <div style="transform: scale(0.5);">
                                    ${renderLogo()}
                                </div>
                                <h1 class="text-xl font-bold">Bella Terra LLC</h1>
                            </div>
                        </div>
                    </div>
                    <div class="max-w-4xl mx-auto p-8 text-center mt-20">
                        <div class="text-8xl mb-6">${section.icon}</div>
                        <h2 class="text-4xl font-bold text-green-700 mb-4">${section.name}</h2>
                        <p class="text-xl text-gray-600 mb-8">This section is under construction</p>
                        <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-6">
                            <p class="text-blue-800 font-semibold">
                                We're building this section to help you find information faster and reduce calls to the office!
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPortalHome() {
            return `
                <div class="min-h-screen bg-white">
                    <div class="bg-green-700 text-white p-6 shadow-lg">
                        <div class="max-w-7xl mx-auto text-center">
                            ${renderLogo()}
                            <h1 class="text-4xl font-bold mt-4">Bella Terra LLC</h1>
                            <p class="text-green-100 mt-2 text-lg">Employee Portal</p>
                        </div>
                    </div>

                    <div class="max-w-7xl mx-auto p-8">
                        <div class="mb-8 text-center">
                            <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome to Your Portal</h2>
                            <p class="text-gray-600">Click any section below to access resources and tools</p>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            ${sections.map(section => `
                                <button
                                    onclick="handleSectionClick('${section.id}')"
                                    class="${section.color} hover:opacity-90 text-white rounded-xl p-8 shadow-lg transition-all hover:scale-105 active:scale-95"
                                >
                                    <div class="text-6xl mb-4">${section.icon}</div>
                                    <div class="text-xl font-bold">${section.name}</div>
                                </button>
                            `).join('')}
                        </div>

                        <div class="mt-12 text-center bg-green-50 border-2 border-green-300 rounded-lg p-6">
                            <p class="text-green-800 font-semibold">
                                💡 Tip: Use this portal to find information quickly instead of calling the office!
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            
            if (!isAuthenticated) {
                app.innerHTML = renderLoginScreen();
                return;
            }

            if (currentSection === 'nursery') {
                app.innerHTML = renderNurserySection();
                return;
            }
if (currentSection === 'hydroseeding') {
    app.innerHTML = renderHydroseedingSection();
    return;
}
            if (currentSection) {
                const section = sections.find(s => s.id === currentSection);
                app.innerHTML = renderComingSoon(section);
                return;
            }

            app.innerHTML = renderPortalHome();
        }

        // Initial render
        render();
    </script>
</body>
</html>
