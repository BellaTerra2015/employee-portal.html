<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log a Call</title>
<meta name="theme-color" content="#2d5a27">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --green-dark:#2d5a27;--green-mid:#4a7c3f;--green-light:#7ab648;
  --green-pale:#e8f5e2;--gray-light:#f5f5f2;--gray-mid:#888;
  --text:#2a2a2a;--border:#d0dcc8;--red:#c0392b;
  --shadow:0 2px 12px rgba(45,90,39,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--gray-light);color:var(--text);min-height:100vh;}
button,input,select,textarea{font-family:inherit;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--green-dark) 0%,var(--green-mid) 60%,var(--green-light) 100%);padding:2rem;}
#login-screen h1{font-family:'Playfair Display',serif;color:#fff;font-size:2rem;margin-bottom:0.25rem;text-align:center;}
#login-screen p{color:rgba(255,255,255,0.75);margin-bottom:2rem;text-align:center;}
.login-box{background:white;border-radius:12px;padding:2rem;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.25);}
.login-box label{display:block;font-weight:600;font-size:0.85rem;color:var(--green-dark);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em;}
.login-box input{width:100%;padding:0.75rem 1rem;border:2px solid var(--border);border-radius:8px;font-size:1rem;margin-bottom:1rem;transition:border-color 0.2s;}
.login-box input:focus{outline:none;border-color:var(--green-mid);}
.btn-login{width:100%;padding:0.85rem;background:var(--green-dark);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;}
.btn-login:hover{background:var(--green-mid);}
.error-msg{color:var(--red);font-size:0.875rem;margin-top:0.5rem;display:none;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column;}
.app-header{background:var(--green-dark);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.app-header h2{font-family:'Playfair Display',serif;color:white;font-size:1.2rem;}
.btn-portal{background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);padding:0.35rem 0.85rem;border-radius:6px;cursor:pointer;font-size:0.85rem;}
.btn-portal:hover{background:rgba(255,255,255,0.25);}

/* ── FORM ── */
.wrap{padding:1.25rem;max-width:640px;margin:0 auto;padding-bottom:2rem;}
.card{background:white;border-radius:12px;padding:1.5rem;box-shadow:var(--shadow);}
.card h4{font-family:'Playfair Display',serif;color:var(--green-dark);font-size:1.1rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:2px solid var(--green-pale);}
.f{margin-bottom:0.85rem;}
.f label{display:block;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--green-dark);margin-bottom:0.35rem;}
.f input,.f select,.f textarea{width:100%;padding:0.6rem 0.85rem;border:1.5px solid var(--border);border-radius:7px;font-size:0.95rem;font-family:inherit;transition:border-color 0.2s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--green-mid);}
.f textarea{resize:vertical;min-height:80px;}
.f .hint{font-size:0.78rem;color:var(--gray-mid);margin-top:0.35rem;}
.f input.other-name{display:none;margin-top:0.4rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.submit-btn{width:100%;padding:0.8rem;background:var(--green-dark);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:0.5rem;transition:background 0.2s;}
.submit-btn:hover{background:var(--green-mid);}
.submit-btn:disabled{background:#aaa;cursor:not-allowed;}
.success-box{display:none;background:var(--green-pale);border:1px solid var(--green-light);border-radius:8px;padding:0.85rem 1rem;color:var(--green-dark);font-size:0.9rem;font-weight:600;margin-top:0.85rem;}
.error-box{display:none;background:#fdeaea;border:1px solid var(--red);border-radius:8px;padding:0.85rem 1rem;color:var(--red);font-size:0.9rem;font-weight:600;margin-top:0.85rem;line-height:1.5;}
@media(max-width:540px){.g2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <h1>📞 Log a Call</h1>
  <p>Log incoming customer inquiries</p>
  <div class="login-box">
    <label>Portal Password</label>
    <input type="password" id="login-pass" placeholder="Enter password" onkeypress="if(event.key==='Enter')doLogin()">
    <p class="error-msg" id="login-error">Incorrect password. Please try again.</p>
    <button class="btn-login" style="margin-top:0.5rem" onclick="doLogin()">Access</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="app-header">
    <h2>📞 Log a Call</h2>
    <button class="btn-portal" onclick="window.location.href='bella_terra_portal_html.html'">← Portal</button>
  </div>
  <div class="wrap">
    <div class="card">
      <h4>📞 Incoming Call Log</h4>

      <div class="g2">
        <div class="f">
          <label>Caller Name</label>
          <input type="text" id="lc-caller-name" placeholder="First Last" autocomplete="off">
        </div>
        <div class="f">
          <label>Phone Number</label>
          <input type="tel" id="lc-phone" placeholder="(360) 555-0000" autocomplete="off">
        </div>
      </div>

      <div class="g2">
        <div class="f">
          <label>Service Type</label>
          <select id="lc-service-type">
            <option value="">Select service…</option>
            <option value="Hydroseeding">Hydroseeding</option>
            <option value="Bark Blowing">Bark Blowing</option>
          </select>
        </div>
        <div class="f">
          <label>Logged By</label>
          <select id="lc-logged-by" onchange="toggleOther(this)">
            <option value="">Select…</option>
            <option value="Rena">Rena</option>
            <option value="Liz">Liz</option>
            <option value="Heather">Heather</option>
            <option value="Brydon">Brydon</option>
            <option value="Ethan">Ethan</option>
            <option value="Kevin">Kevin</option>
            <option value="Emily">Emily</option>
            <option value="Robert">Robert</option>
            <option value="Randy">Randy</option>
            <option value="__other__">Other — type name…</option>
          </select>
          <input type="text" id="lc-logged-by-other" class="other-name" placeholder="Type name…">
        </div>
      </div>

      <div class="f">
        <label>Job Address</label>
        <input type="text" id="lc-address" placeholder="123 Main St, City, State">
      </div>

      <div class="f">
        <label>Lot Size / Sq Ft or CY</label>
        <input type="text" id="lc-lot-size" placeholder="e.g. 4500">
        <div class="hint">sq ft for hydroseed &nbsp;·&nbsp; CY for bark</div>
      </div>

      <div class="f">
        <label>Notes</label>
        <textarea id="lc-notes" placeholder="Any additional details about the call…"></textarea>
      </div>

      <div class="f">
        <label>Date &amp; Time</label>
        <input type="datetime-local" id="lc-datetime">
      </div>

      <button class="submit-btn" id="lc-submit-btn" onclick="submitLogCall()">📞 Log This Call</button>

      <div class="success-box" id="lc-success">✅ Call logged successfully. Form cleared.</div>
      <div class="error-box" id="lc-error"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CREDENTIALS — update here only, nowhere else
// ═══════════════════════════════════════════════
var PORTAL_PW = 'bellaterra';
var AT_BASE   = 'appdtsnIEuASNVrn4';
var AT_TABLE  = 'tblQQcyu5tdHNhk1d';
var AT_TOKEN  = 'patTWo30QfHzcYBh2.fd64fbfa6d16009e1b49c6e7e55e2fa0a0962882b91335bde4398c8179bca89a';

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function doLogin(){
  var pass = document.getElementById('login-pass').value;
  var err  = document.getElementById('login-error');
  if(pass !== PORTAL_PW){ err.style.display='block'; return; }
  err.style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  stampDatetime();
}
document.getElementById('login-pass').addEventListener('keypress', e=>{ if(e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════════════
// FORM HELPERS
// ═══════════════════════════════════════════════
function toggleOther(sel){
  var other = document.getElementById('lc-logged-by-other');
  other.style.display = sel.value==='__other__' ? 'block' : 'none';
  if(sel.value !== '__other__') other.value = '';
}

function stampDatetime(){
  var now = new Date();
  var iso = now.getFullYear()+'-'
    +String(now.getMonth()+1).padStart(2,'0')+'-'
    +String(now.getDate()).padStart(2,'0')+'T'
    +String(now.getHours()).padStart(2,'0')+':'
    +String(now.getMinutes()).padStart(2,'0');
  document.getElementById('lc-datetime').value = iso;
}

// ═══════════════════════════════════════════════
// SUBMIT TO AIRTABLE
// ═══════════════════════════════════════════════
function submitLogCall(){
  var callerName  = document.getElementById('lc-caller-name').value.trim();
  var phone       = document.getElementById('lc-phone').value.trim();
  var serviceType = document.getElementById('lc-service-type').value;
  var address     = document.getElementById('lc-address').value.trim();
  var lotSize     = document.getElementById('lc-lot-size').value.trim();
  var notes       = document.getElementById('lc-notes').value.trim();
  var loggedByRaw = document.getElementById('lc-logged-by').value;
  var loggedBy    = loggedByRaw==='__other__' ? document.getElementById('lc-logged-by-other').value.trim() : loggedByRaw;
  var datetime    = document.getElementById('lc-datetime').value;

  var errEl = document.getElementById('lc-error');
  errEl.style.display='none';
  document.getElementById('lc-success').style.display='none';

  if(!callerName || !serviceType || !loggedBy){
    errEl.textContent='⚠ Caller Name, Service Type, and Logged By are required.';
    errEl.style.display='block'; return;
  }

  var btn = document.getElementById('lc-submit-btn');
  btn.disabled=true; btn.textContent='⏳ Logging…';

  var isoDatetime = datetime ? new Date(datetime).toISOString() : new Date().toISOString();

  fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+AT_TABLE, {
    method:'POST',
    headers:{ 'Authorization':'Bearer '+AT_TOKEN, 'Content-Type':'application/json' },
    body: JSON.stringify({ fields:{
      'Caller Name':           callerName,
      'Phone':                 phone,
      'Service Type':          serviceType,
      'Job Address':           address,
      'Lot Size / Sq Ft or CY': lotSize,
      'Notes':                 notes,
      'Logged By':             loggedBy,
      'Date & Time':           isoDatetime,
      'Status':                'Open'
    }})
  })
  .then(res=>{
    if(res.ok){ lcSuccess(btn); }
    else{ return res.json().then(d=>{ lcError(btn, d.error ? d.error.message : 'Server error ('+res.status+'). Please retry.'); }); }
  })
  .catch(err=>{ lcError(btn, 'Network error — check your connection and retry. ('+(err.message||err)+')'); });
}

function lcSuccess(btn){
  btn.disabled=false; btn.textContent='📞 Log This Call';
  document.getElementById('lc-success').style.display='block';
  ['lc-caller-name','lc-phone','lc-address','lc-lot-size','lc-notes'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('lc-service-type').value='';
  document.getElementById('lc-logged-by').value='';
  document.getElementById('lc-logged-by-other').value='';
  document.getElementById('lc-logged-by-other').style.display='none';
  stampDatetime();
  setTimeout(()=>{ document.getElementById('lc-success').style.display='none'; }, 6000);
}

function lcError(btn, msg){
  btn.disabled=false; btn.textContent='📞 Log This Call';
  var errEl = document.getElementById('lc-error');
  errEl.textContent = '❌ '+msg;
  errEl.style.display='block';
}
</script>
</body>
</html>
