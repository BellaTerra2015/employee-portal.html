<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On Our Way — Hydroseeding</title>
<meta name="theme-color" content="#2d5a27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ── BASE ── */
:root {
  --green-dark:#2d5a27;--green-mid:#4a7c3f;--green-light:#7ab648;
  --green-pale:#e8f5e2;--white:#ffffff;--gray-light:#f5f5f2;
  --gray-mid:#888;--text:#2a2a2a;--border:#d0dcc8;--red:#c0392b;
  --shadow:0 2px 12px rgba(45,90,39,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--gray-light);color:var(--text);min-height:100vh;}
button,input{font-family:inherit;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--green-dark) 0%,var(--green-mid) 60%,var(--green-light) 100%);padding:2rem;}
#login-screen h1{font-family:'Playfair Display',serif;color:#fff;font-size:2rem;margin-bottom:0.25rem;text-align:center;}
#login-screen p{color:rgba(255,255,255,0.75);margin-bottom:2rem;text-align:center;}
.login-box{background:white;border-radius:12px;padding:2rem;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.25);}
.login-box label{display:block;font-weight:600;font-size:0.85rem;color:var(--green-dark);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em;}
.login-box input{width:100%;padding:0.75rem 1rem;border:2px solid var(--border);border-radius:8px;font-size:1rem;margin-bottom:1rem;transition:border-color 0.2s;}
.login-box input:focus{outline:none;border-color:var(--green-mid);}
.btn-login{width:100%;padding:0.85rem;background:var(--green-dark);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;}
.btn-login:hover{background:var(--green-mid);}
.error-msg{color:var(--red);font-size:0.875rem;margin-top:0.5rem;display:none;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column;}
.app-header{background:var(--green-dark);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.app-header h2{font-family:'Playfair Display',serif;color:white;font-size:1.2rem;}
.btn-back{background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);padding:0.35rem 0.85rem;border-radius:6px;cursor:pointer;font-size:0.85rem;}
.btn-back:hover{background:rgba(255,255,255,0.25);}

/* ── OMW CARD ── */
.omw-wrap{padding:1.5rem;max-width:520px;margin:0 auto;}
.omw-card{background:white;border-radius:16px;padding:2rem;box-shadow:var(--shadow);}
.omw-field{width:100%;padding:0.65rem 0.85rem;border:2px solid var(--border);border-radius:8px;font-size:1rem;margin-top:0.35rem;transition:border-color 0.2s;}
.omw-field:focus{outline:none;border-color:var(--green-mid);}
.omw-label{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--green-dark);display:block;}
.omw-preview{background:var(--gray-light);border-radius:10px;padding:1rem;margin:1rem 0;font-size:0.88rem;color:#444;line-height:1.6;}
.omw-send-btn{width:100%;padding:0.9rem;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;color:white;margin-top:0.5rem;background:var(--green-dark);}
.omw-send-btn.dim{background:#aaa;cursor:default;}
.omw-back-link{background:none;border:none;color:var(--gray-mid);cursor:pointer;font-size:0.9rem;margin-bottom:1.25rem;padding:0;display:flex;align-items:center;gap:0.25rem;}
.omw-success{background:#eaf7ea;border:1.5px solid var(--green-light);border-radius:12px;padding:2rem;text-align:center;margin-top:0.5rem;}
.result-card{border:2px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:0.75rem;cursor:pointer;transition:all 0.15s;}
.result-card:hover{border-color:var(--green-light);background:var(--green-pale);}
.eta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-top:0.5rem;}
.eta-btn{padding:0.5rem 0.25rem;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;border:2px solid var(--border);background:white;color:#555;transition:all 0.15s;}
.eta-btn.sel{border-color:var(--green-dark);background:var(--green-pale);color:var(--green-dark);}
.section-box{background:white;border-radius:12px;border:2px solid var(--border);padding:1.25rem;margin-bottom:1rem;}
.omw-error{color:var(--red);font-size:0.85rem;margin-bottom:0.5rem;display:none;}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <h1>💧 On Our Way</h1>
  <p>Hydroseeding</p>
  <div class="login-box">
    <label>Portal Password</label>
    <input type="password" id="login-pass" placeholder="Enter password" onkeypress="if(event.key==='Enter')doLogin()">
    <p class="error-msg" id="login-error">Incorrect password. Please try again.</p>
    <button class="btn-login" style="margin-top:1rem" onclick="doLogin()">Access</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="app-header">
    <h2>💧 On Our Way — Hydroseeding</h2>
    <button class="btn-back" onclick="window.location.href='bella_terra_portal_html.html'">← Portal</button>
  </div>
  <div class="omw-wrap">
    <div class="omw-card" id="omw-card"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CREDENTIALS — update here only, nowhere else
// ═══════════════════════════════════════════════
var PORTAL_PW  = 'bellaterra';
var LOOKUP_URL = 'https://script.google.com/macros/s/AKfycbztvESvljI8jPfZQXUyaBj1AbsjwAlV4JBTlVq_PJrruLz4gMPBc_GU71326_MOpV8/exec';
var CS_USER    = 'Bids@1bellaterra.com';
var CS_KEY     = 'F056C597-29B2-0CBF-EFC6-39EFD8EA0628';
var CS_FROM    = '+13602251125';

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function doLogin(){
  var pass = document.getElementById('login-pass').value;
  var err  = document.getElementById('login-error');
  if(pass !== PORTAL_PW){ err.style.display='block'; return; }
  err.style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  startOMW();
}
document.getElementById('login-pass').addEventListener('keypress', e=>{ if(e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════════════
// ON OUR WAY — HYDROSEEDING
// ═══════════════════════════════════════════════
var ETA_OPTIONS = ['15 minutes','30 minutes','45 minutes','1 hour','1.5 hours','2 hours','2.5 hours','3 hours','4 hours'];
var omwStep='search', omwName='', omwPhone='', omwEta='', omwResults=[];

function startOMW(){ omwStep='search'; omwName=''; omwPhone=''; omwEta=''; omwResults=[]; render(); }

function render(){
  var card = document.getElementById('omw-card');
  if(omwStep==='search'){
    card.innerHTML = `
      <h3 style="font-family:'Playfair Display',serif;color:#2d5a27;font-size:1.3rem;margin-bottom:0.35rem;">Search Customer</h3>
      <p style="color:#888;font-size:0.9rem;margin-bottom:1.25rem;">Type the customer's last name to find their job.</p>
      <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
        <input class="omw-field" id="omw-search" placeholder="Customer last name…" style="margin-top:0;flex:1;" onkeypress="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()" style="padding:0.65rem 1rem;background:#2d5a27;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Search</button>
      </div>
      <div id="search-results"></div>`;
    setTimeout(()=>{ var el=document.getElementById('omw-search'); if(el) el.focus(); },100);

  } else if(omwStep==='review'){
    var etaBtns = ETA_OPTIONS.map(opt=>`<button class="eta-btn${omwEta===opt?' sel':''}" onclick="setEta('${opt}')">${opt}</button>`).join('');
    var preview = omwEta ? `<div class="omw-preview"><div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:0.3rem;">Message Preview</div>Your Bella Terra crew is on the way! ETA: ${omwEta}. We look forward to seeing you. – Bella Terra LLC</div>` : '';
    card.innerHTML = `
      <button class="omw-back-link" onclick="startOMW()">← Search Again</button>
      <h3 style="font-family:'Playfair Display',serif;color:#2d5a27;font-size:1.3rem;margin-bottom:1rem;">Review &amp; Send</h3>
      <div class="section-box">
        <div style="margin-bottom:0.85rem;">
          <label class="omw-label">Customer Name</label>
          <input class="omw-field" id="name-input" value="${omwName}" oninput="omwName=this.value">
        </div>
        <div>
          <label class="omw-label">Customer Phone</label>
          <input class="omw-field" id="phone-input" value="${omwPhone}" placeholder="10-digit number" oninput="omwPhone=this.value">
        </div>
      </div>
      <div class="section-box">
        <label class="omw-label">Select ETA</label>
        <div class="eta-grid">${etaBtns}</div>
      </div>
      ${preview}
      <div class="omw-error" id="omw-error"></div>
      <button class="omw-send-btn${omwEta&&omwPhone?'':' dim'}" onclick="sendText()">📤 Send Text</button>`;

  } else if(omwStep==='sent'){
    card.innerHTML = `
      <div class="omw-success">
        <div style="font-size:2.5rem;margin-bottom:0.75rem;">✅</div>
        <h3 style="font-family:'Playfair Display',serif;color:#2d5a27;margin-bottom:0.5rem;">Text Sent!</h3>
        <p style="color:#555;margin-bottom:0.2rem;"><strong>${omwName}</strong></p>
        <p style="color:#555;font-size:0.9rem;margin-bottom:0.2rem;">${omwPhone}</p>
        <p style="color:#555;font-size:0.9rem;margin-bottom:1.5rem;">ETA: <strong>${omwEta}</strong></p>
        <button onclick="startOMW()" style="padding:0.75rem 2rem;background:#2d5a27;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;">Send Another</button>
      </div>`;
  }
}

function doSearch(){
  var q = (document.getElementById('omw-search')||{}).value||'';
  if(q.trim().length<2){ document.getElementById('search-results').innerHTML='<p style="color:#c0392b;font-size:0.85rem;">Please enter at least 2 characters.</p>'; return; }
  document.getElementById('search-results').innerHTML='<div style="text-align:center;padding:1.25rem;color:#2d5a27;font-weight:600;">🔍 Searching…</div>';
  fetch(LOOKUP_URL+'?name='+encodeURIComponent(q)+'&service=hydroseeding')
    .then(r=>r.json()).then(data=>{
      var results = data.results||[];
      if(!results.length){ document.getElementById('search-results').innerHTML='<p style="color:#888;font-size:0.9rem;text-align:center;padding:1rem;">No jobs found for "<strong>'+q+'</strong>".</p>'; return; }
      var html = '<p style="font-size:0.82rem;color:#888;margin-bottom:0.75rem;">'+results.length+' job(s) found — tap to select:</p>';
      results.forEach((r,i)=>{ html+='<div class="result-card" onclick="selectCustomer('+i+')"><div style="font-weight:700;font-size:1rem;color:#2d5a27;">'+r.name+'</div><div style="font-size:0.82rem;color:#666;margin-top:0.2rem;">📅 '+r.requestedDate+' · '+r.service+'</div></div>'; });
      omwResults = results;
      document.getElementById('search-results').innerHTML = html;
    }).catch(()=>{ document.getElementById('search-results').innerHTML='<p style="color:#c0392b;font-size:0.85rem;">Search failed. Check connection.</p>'; });
}

function selectCustomer(i){ var r=omwResults[i]; omwName=r.name; omwPhone=r.phone; omwStep='review'; render(); }
function setEta(opt){ omwEta=opt; render(); }

function sendText(){
  omwName  = document.getElementById('name-input')  ? document.getElementById('name-input').value  : omwName;
  omwPhone = document.getElementById('phone-input') ? document.getElementById('phone-input').value : omwPhone;
  var errEl = document.getElementById('omw-error');
  if(!omwPhone){ errEl.style.display='block'; errEl.textContent='Phone number is required.'; return; }
  if(!omwEta){   errEl.style.display='block'; errEl.textContent='Please select an ETA.'; return; }
  var digits = omwPhone.replace(/\D/g,'');
  var to     = digits.length===10 ? '+1'+digits : '+'+digits;
  var auth   = btoa(CS_USER+':'+CS_KEY);
  var msg    = 'Your Bella Terra crew is on the way! ETA: '+omwEta+'. We look forward to seeing you. – Bella Terra LLC';
  fetch('https://rest.clicksend.com/v3/sms/send',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Basic '+auth},
    body:JSON.stringify({messages:[{source:'sdk',from:CS_FROM,to:to,body:msg}]})
  }).then(r=>r.json()).then(data=>{
    if(data.response_code==='SUCCESS'){ omwStep='sent'; render(); }
    else{ errEl.style.display='block'; errEl.textContent='Send failed: '+(data.response_msg||'Check credentials.'); }
  }).catch(()=>{ errEl.style.display='block'; errEl.textContent='Network error. Check connection.'; });
}
</script>
</body>
</html>
