<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Scheduler — Bella Terra</title>
<meta name="theme-color" content="#2d5a27">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#2d5a27;--gm:#4a7c3f;--gl:#7ab648;
  --pale:#e8f5e2;--bg:#f5f5f2;--gray:#888;
  --text:#2a2a2a;--border:#d0dcc8;--red:#c0392b;
  --shd:0 2px 12px rgba(45,90,39,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
button,input{font-family:inherit;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--gd) 0%,var(--gm) 60%,var(--gl) 100%);padding:2rem;}
#login-screen h1{font-family:'Playfair Display',serif;color:#fff;font-size:2rem;margin-bottom:0.25rem;text-align:center;}
#login-screen p{color:rgba(255,255,255,0.75);margin-bottom:2rem;text-align:center;}
.login-box{background:white;border-radius:12px;padding:2rem;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.25);}
.login-box label{display:block;font-weight:600;font-size:0.85rem;color:var(--gd);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em;}
.login-box input{width:100%;padding:0.75rem 1rem;border:2px solid var(--border);border-radius:8px;font-size:1rem;margin-bottom:1rem;transition:border-color 0.2s;}
.login-box input:focus{outline:none;border-color:var(--gm);}
.btn-login{width:100%;padding:0.85rem;background:var(--gd);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;}
.btn-login:hover{background:var(--gm);}
.login-err{color:var(--red);font-size:0.875rem;margin-top:0.5rem;display:none;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column;}
.app-header{background:var(--gd);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.app-header h2{font-family:'Playfair Display',serif;color:white;font-size:1.2rem;}
.btn-portal{background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);padding:0.35rem 0.85rem;border-radius:6px;cursor:pointer;font-size:0.85rem;}
.btn-portal:hover{background:rgba(255,255,255,0.25);}

/* ── CONTENT ── */
.wrap{padding:1.25rem;max-width:700px;margin:0 auto;padding-bottom:3rem;}

/* ── LOADING / EMPTY ── */
.state-box{border-radius:12px;padding:2rem;text-align:center;margin-top:1rem;}
.state-box .icon{font-size:2.5rem;margin-bottom:0.75rem;}
.state-box .title{font-weight:700;font-size:1.1rem;margin-bottom:0.4rem;}
.state-box .sub{font-size:0.9rem;color:var(--gray);}
.state-loading{background:var(--pale);border:2px solid var(--gl);}
.state-loading .title{color:var(--gd);}
.state-empty{background:var(--pale);border:2px solid var(--gl);}
.state-empty .title{color:var(--gd);}
.state-error{background:#fdeaea;border:2px solid var(--red);}
.state-error .title{color:var(--red);}

/* ── JOB BAR ── */
.job-bar{background:var(--pale);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;}
.job-bar strong{color:var(--gd);}
.btn-toggle{padding:0.4rem 0.9rem;background:white;border:2px solid var(--gm);border-radius:7px;font-size:0.82rem;font-weight:700;color:var(--gd);cursor:pointer;}
.btn-toggle:hover{background:var(--pale);}

/* ── JOB CARD ── */
.job-card{background:white;border:2px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;transition:opacity 0.2s,border-color 0.2s;}
.job-card.unchecked{opacity:0.4;border-color:#ccc;}
.job-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;gap:0.75rem;}
.job-check-wrap{display:flex;align-items:center;gap:0.75rem;}
.job-check-wrap input[type=checkbox]{width:22px;height:22px;accent-color:var(--gd);cursor:pointer;flex-shrink:0;}
.job-name{font-weight:700;font-size:1.1rem;color:var(--gd);}
.job-phone{font-size:0.875rem;color:var(--gray);margin-top:0.2rem;}
.job-cal{text-align:right;flex-shrink:0;}
.job-cal-lbl{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);}
.job-cal-val{font-weight:700;color:var(--gm);font-size:0.95rem;}
.info-box{background:var(--bg);border-radius:8px;padding:0.85rem 1rem;margin-bottom:0.85rem;}
.info-lbl{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-bottom:0.4rem;font-weight:700;}
.info-val{font-size:0.93rem;line-height:1.5;}
.time-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-top:0.5rem;}
.time-lbl{display:block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gd);margin-bottom:0.35rem;}
.time-input{width:100%;padding:0.6rem;border:2px solid var(--border);border-radius:7px;font-size:0.93rem;transition:border-color 0.2s;}
.time-input:focus{outline:none;border-color:var(--gm);}
.btn-preview{width:100%;padding:0.6rem;background:var(--gm);color:white;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:0.9rem;margin-top:1.55rem;}
.btn-preview:hover{background:var(--gd);}
.preview-box{display:none;background:var(--pale);border:2px solid var(--gl);border-radius:8px;padding:1rem;margin-top:0.85rem;font-family:monospace;font-size:0.83rem;white-space:pre-wrap;line-height:1.6;}

/* ── SEND BAR ── */
.send-bar{position:sticky;bottom:0;background:rgba(245,245,242,0.96);backdrop-filter:blur(6px);padding:1rem 1.25rem;border-top:2px solid var(--border);display:flex;gap:0.75rem;max-width:700px;margin:0 auto;}
.btn-send{flex:1;padding:0.9rem;background:var(--gd);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
.btn-send:hover:not(:disabled){background:var(--gm);}
.btn-send:disabled{background:#aaa;cursor:not-allowed;}
.btn-reload{padding:0.9rem 1.25rem;background:white;color:var(--gd);border:2px solid var(--border);border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;}
.btn-reload:hover{border-color:var(--gm);}

/* ── SUCCESS ── */
#success-screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.success-card{background:white;border-radius:16px;padding:2.5rem;max-width:400px;width:100%;box-shadow:var(--shd);}
.success-card .big-check{font-size:3rem;margin-bottom:0.75rem;}
.success-card h3{font-family:'Playfair Display',serif;color:var(--gd);font-size:1.4rem;margin-bottom:0.5rem;}
.success-card p{color:var(--gray);font-size:0.95rem;margin-bottom:1.5rem;}
.btn-again{padding:0.8rem 2rem;background:var(--gd);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.btn-again:hover{background:var(--gm);}

@media(max-width:500px){.time-row{grid-template-columns:1fr 1fr;}.time-row>div:last-child{grid-column:1/-1;}.btn-preview{margin-top:0;}}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <h1>📋 Service Scheduler</h1>
  <p>Tomorrow's Confirmation Texts</p>
  <div class="login-box">
    <label>Portal Password</label>
    <input type="password" id="login-pass" placeholder="Enter password" onkeypress="if(event.key==='Enter')doLogin()">
    <p class="login-err" id="login-error">Incorrect password. Please try again.</p>
    <button class="btn-login" style="margin-top:0.5rem" onclick="doLogin()">Access</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="app-header">
    <h2>📋 Service Scheduler</h2>
    <button class="btn-portal" onclick="window.location.href='bella_terra_portal_html.html'">← Portal</button>
  </div>
  <div class="wrap" id="main-wrap">
    <!-- populated by JS -->
  </div>
  <!-- sticky send bar — shown only when jobs loaded -->
  <div class="send-bar" id="send-bar" style="display:none;">
    <button class="btn-reload" onclick="loadJobs()" title="Reload jobs">↺ Reload</button>
    <button class="btn-send" id="send-btn" onclick="sendAllConfirmations()">📤 Send Confirmations</button>
  </div>
</div>

<!-- ═══ SUCCESS ═══ -->
<div id="success-screen">
  <div class="success-card">
    <div class="big-check">✅</div>
    <h3>Texts Sent!</h3>
    <p id="success-msg">Confirmation texts sent successfully.</p>
    <button class="btn-again" onclick="reloadPage()">📋 Schedule Another Day</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CREDENTIALS — update here only
// ═══════════════════════════════════════════════
var PORTAL_PW   = 'bellaterra';
var SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbzVCPFrgdetIrxKHqVi68ZVY7J3kS38HZycXLl_yq3_OTEiNlT_k5OfJPZWp-Vgt1rZ8Q/exec';

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var schedulerJobs = [];

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function doLogin(){
  var pass = document.getElementById('login-pass').value;
  var err  = document.getElementById('login-error');
  if(pass !== PORTAL_PW){ err.style.display='block'; return; }
  err.style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  loadJobs();
}
document.getElementById('login-pass').addEventListener('keypress', function(e){ if(e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════════════
// LOAD JOBS
// ═══════════════════════════════════════════════
function loadJobs(){
  schedulerJobs = [];
  document.getElementById('send-bar').style.display='none';
  document.getElementById('main-wrap').innerHTML = `
    <div class="state-box state-loading">
      <div class="icon">⏳</div>
      <div class="title">Loading Tomorrow's Jobs…</div>
      <div class="sub">Checking Google Calendar</div>
    </div>`;

  fetch(SCRIPT_URL + '?action=getTomorrowJobs')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.error) throw new Error(data.error);
      schedulerJobs = data.jobs || [];
      renderJobs();
    })
    .catch(function(err){
      document.getElementById('main-wrap').innerHTML = `
        <div class="state-box state-error">
          <div class="icon">⚠️</div>
          <div class="title">Error Loading Jobs</div>
          <div class="sub">${err.message}</div>
        </div>
        <div style="text-align:center;margin-top:1.25rem;">
          <button onclick="loadJobs()" style="padding:0.75rem 1.5rem;background:var(--gd);color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;">↺ Try Again</button>
        </div>`;
    });
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderJobs(){
  var wrap = document.getElementById('main-wrap');

  if(!schedulerJobs.length){
    wrap.innerHTML = `
      <div class="state-box state-empty">
        <div class="icon">📭</div>
        <div class="title">No Jobs Scheduled for Tomorrow</div>
        <div class="sub">Check back later or reload if you think this is wrong.</div>
      </div>
      <div style="text-align:center;margin-top:1rem;">
        <button onclick="loadJobs()" style="padding:0.7rem 1.5rem;background:var(--gd);color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;">↺ Reload</button>
      </div>`;
    return;
  }

  var html = `
    <div class="job-bar">
      <span><strong>${schedulerJobs.length} job(s)</strong> scheduled for tomorrow — uncheck any you don't want to text</span>
      <button class="btn-toggle" id="toggle-all-btn" onclick="toggleAllJobs()">Uncheck All</button>
    </div>`;

  schedulerJobs.forEach(function(job, i){
    var serviceLines = job.services.map(function(s){ return '• '+s; }).join('<br>');
    html += `
    <div class="job-card" id="job-card-${i}">
      <div class="job-top">
        <div class="job-check-wrap">
          <input type="checkbox" id="job-check-${i}" checked onchange="toggleCard(${i})">
          <div>
            <div class="job-name">${job.customerName}</div>
            <div class="job-phone">${job.phone}</div>
          </div>
        </div>
        <div class="job-cal">
          <div class="job-cal-lbl">Calendar</div>
          <div class="job-cal-val">${job.calendar}</div>
        </div>
      </div>

      <div class="info-box">
        <div class="info-lbl">Services</div>
        <div class="info-val">${serviceLines}</div>
      </div>

      <div class="info-box">
        <div class="info-lbl">Address</div>
        <div class="info-val">${job.address}</div>
      </div>

      <div class="time-row">
        <div>
          <label class="time-lbl" for="start-${i}">Start Time</label>
          <input type="time" id="start-${i}" class="time-input" value="${job.startTime}" onchange="updateTime(${i},'start',this.value)">
        </div>
        <div>
          <label class="time-lbl" for="end-${i}">End Time</label>
          <input type="time" id="end-${i}" class="time-input" value="${job.endTime}" onchange="updateTime(${i},'end',this.value)">
        </div>
        <div>
          <button class="btn-preview" onclick="togglePreview(${i})">👁 Preview</button>
        </div>
      </div>

      <div class="preview-box" id="preview-${i}"></div>
    </div>`;
  });

  wrap.innerHTML = html;
  document.getElementById('send-bar').style.display='flex';
  updateSendBtn();
}

// ═══════════════════════════════════════════════
// CARD INTERACTIONS
// ═══════════════════════════════════════════════
function toggleCard(i){
  var checked = document.getElementById('job-check-'+i).checked;
  var card    = document.getElementById('job-card-'+i);
  card.classList.toggle('unchecked', !checked);
  updateSendBtn();
  // update toggle-all label
  var allChecked = schedulerJobs.every(function(_,j){ return document.getElementById('job-check-'+j).checked; });
  var noneChecked = schedulerJobs.every(function(_,j){ return !document.getElementById('job-check-'+j).checked; });
  var btn = document.getElementById('toggle-all-btn');
  if(btn) btn.textContent = noneChecked ? 'Check All' : 'Uncheck All';
}

function toggleAllJobs(){
  var allChecked = schedulerJobs.every(function(_,j){ return document.getElementById('job-check-'+j).checked; });
  schedulerJobs.forEach(function(_,j){
    var cb = document.getElementById('job-check-'+j);
    if(cb){ cb.checked = !allChecked; toggleCard(j); }
  });
}

function updateTime(i, type, val){
  if(type==='start') schedulerJobs[i].startTime = val;
  else               schedulerJobs[i].endTime   = val;
}

function togglePreview(i){
  var box = document.getElementById('preview-'+i);
  if(box.style.display==='block'){
    box.style.display='none'; return;
  }
  box.textContent = buildMessage(schedulerJobs[i]);
  box.style.display='block';
}

function updateSendBtn(){
  var count = schedulerJobs.filter(function(_,j){ return document.getElementById('job-check-'+j) && document.getElementById('job-check-'+j).checked; }).length;
  var btn = document.getElementById('send-btn');
  if(btn){
    btn.textContent  = '📤 Send Confirmations ('+count+')';
    btn.disabled     = (count===0);
  }
}

// ═══════════════════════════════════════════════
// MESSAGE BUILDER
// ═══════════════════════════════════════════════
function buildMessage(job){
  var start = fmtTime(job.startTime);
  var end   = fmtTime(job.endTime);
  var serviceText = job.services.length===1
    ? 'SERVICE: '+job.services[0]
    : 'SERVICES:\n'+job.services.map(function(s){ return '• '+s; }).join('\n');

  return 'Good news! ☀️ Bella Terra scheduled for tomorrow, '+job.date+' between '+start+' - '+end+'.\n\n'+serviceText+'\n\nADDRESS: '+job.address+'\n\nReply Y to confirm, D to delay or update, C to cancel.\n\nQuestions? Call 360-225-1125';
}

function fmtTime(t){
  var parts = (t||'').split(':');
  var h = parseInt(parts[0]||0);
  var m = parts[1]||'00';
  var ampm = h>=12 ? 'PM':'AM';
  var h12  = h===0?12:(h>12?h-12:h);
  return h12+':'+m+' '+ampm;
}

// ═══════════════════════════════════════════════
// SEND
// ═══════════════════════════════════════════════
async function sendAllConfirmations(){
  var selected = schedulerJobs.filter(function(_,j){
    var cb = document.getElementById('job-check-'+j);
    return cb && cb.checked;
  });
  if(!selected.length){ alert('No customers selected. Check at least one box to send.'); return; }
  if(!confirm('Send confirmation texts to '+selected.length+' customer(s)?')) return;

  var btn = document.getElementById('send-btn');
  btn.disabled    = true;
  btn.textContent = '⏳ Sending…';

  try{
    var res  = await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'sendConfirmations', jobs:selected})
    });
    var data = await res.json();
    if(data.success){
      document.getElementById('app').style.display='none';
      document.getElementById('success-msg').textContent = 'Sent '+data.sent+' confirmation text'+(data.sent===1?'':'s')+' successfully.';
      document.getElementById('success-screen').style.display='flex';
    } else {
      throw new Error(data.error||'Unknown error');
    }
  } catch(err){
    alert('❌ Error sending texts: '+err.message);
    btn.disabled    = false;
    updateSendBtn();
  }
}

function reloadPage(){ window.location.reload(); }
</script>
</body>
</html>
